# ========================================================
#  SmashRank - Application Configuration
# ========================================================

# ---- Servidor ----
server.port=8080
spring.application.name=smashrank

# ---- PostgreSQL (Docker) ----
spring.datasource.url=jdbc:postgresql://postgres-db:5432/mi_base_datos
spring.datasource.username=mi_usuario
spring.datasource.password=mi_password
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- Connection Pool (HikariCP) ----
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ---- Start.gg GraphQL API ----
startgg.api.url=https://api.start.gg/gql/alpha
startgg.api.token=${STARTGG_API_TOKEN:YOUR_STARTGG_BEARER_TOKEN_HERE}
startgg.client-id=${STARTGG_CLIENT_ID:placeholder_client_id}
startgg.client-secret=${STARTGG_CLIENT_SECRET:placeholder_client_secret}
startgg.redirect-uri=${STARTGG_REDIRECT_URI:http://localhost:4200/auth/callback}
startgg.country.filter=${STARTGG_COUNTRY_FILTER:Spain}
startgg.region.filter=${STARTGG_REGION_FILTER:Andalusia}

# ---- Logging ----
logging.level.com.smashrank=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE
