# ========================================================
#  SmashRank - Perfil LOCAL (desarrollo sin Docker para la app)
#  Uso: mvn spring-boot:run -Dspring-boot.run.profiles=local
# ========================================================

# ---- PostgreSQL en Docker pero accedido desde el host ----
spring.datasource.url=jdbc:postgresql://localhost:5432/mi_base_datos
spring.datasource.username=mi_usuario
spring.datasource.password=mi_password

# ---- Logs más verbosos en local ----
logging.level.com.smashrank=DEBUG
logging.level.org.hibernate.SQL=DEBUG
